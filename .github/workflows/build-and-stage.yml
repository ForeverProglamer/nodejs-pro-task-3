name: Build Docker image and deploy to stage env
on:
  push:
    # TODO: Remove feature/** (used only for testing)
    branches: [develop, feature/**]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api
          IMAGE=${IMAGE,,} # Convert my username to lowercase
          TAG=sha-${{ github.sha }}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to GitHub Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Create release-manifest.json
        run: |
          cat <<EOF > release-manifest.json
          {
            "commit": "${{ github.sha }}",
            "services": {
              "api": {
                "image": "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}",
                "digest": "${{ steps.build-and-push.outputs.digest }}"
              }
            }
          }
          EOF

      - name: Save artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: release-manifest.json

  deploy-stage:
    needs: build
    runs-on: [self-hosted, stage]
    environment:
      name: stage
    env:
      IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from the registry
        run: docker pull "$IMAGE"

      - name: Deploy
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_PORT: ${{ vars.API_PORT }}
        run: |
          cp .env.example .env
          echo "DB_PASSWORD=$DB_PASSWORD" >> .env
          echo "API_PORT=$API_PORT" >> .env
          docker compose -f compose.prod.yml -p stage up -d

      - name: Post-deploy test
        run: |
          ATTEMPTS=8
          SLEEP=2

          for i in $(seq 1 $ATTEMPTS); do
            echo "Attempt $i..."

            if curl -sf http://localhost:${{ vars.API_PORT }}/health; then
              echo "API is healthy"
              exit 0
            fi

            echo "Not ready yet"
            sleep $SLEEP
          done

          echo "API failed to become healthy"
          exit 1
