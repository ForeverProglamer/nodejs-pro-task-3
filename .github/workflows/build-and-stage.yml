name: Build Docker image and deploy to stage env
on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api
          IMAGE=${IMAGE,,} # Convert my username to lowercase
          TAG=sha-${{ github.sha }}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to GitHub Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Create release-manifest.json
        run: |
          cat <<EOF > release-manifest.json
          {
            "commit": "${{ github.sha }}",
            "services": {
              "api": {
                "image": "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}",
                "digest": "${{ steps.build-and-push.outputs.digest }}"
              }
            }
          }
          EOF

      - name: Save artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: release-manifest.json

  deploy-stage:
    needs: build
    runs-on: [self-hosted, stage]
    environment:
      name: stage
    env:
      IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from the registry
        run: docker pull ${{ env.IMAGE }}

      - name: Deploy
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_PORT: ${{ vars.API_PORT }}
          # Just to be explicit about dependency on IMAGE
          IMAGE: ${{ env.IMAGE }}
          JWT_AT_SECRET: ${{ secrets.JWT_AT_SECRET }}
          JWT_RT_SECRET: ${{ secrets.JWT_RT_SECRET }}
        run: |
          cp .env.example .env
          echo "DB_PASSWORD=$DB_PASSWORD" >> .env
          echo "API_PORT=$API_PORT" >> .env
          echo "JWT_AT_SECRET=$JWT_AT_SECRET" >> .env
          echo "JWT_RT_SECRET=$JWT_RT_SECRET" >> .env
          docker compose -f compose.prod.yml -p stage up -d

      - name: Post-deploy test
        uses: ./.github/actions/wait-for-health
        with:
          url: http://localhost:${{ vars.API_PORT }}/api/health
          attempts: 8
          sleep: 2
