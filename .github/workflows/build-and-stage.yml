name: Build Docker image and deploy to stage env
on:
  push:
    # TODO: Remove feature/** (used only for testing)
    branches: [develop, feature/**]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api
          IMAGE=${IMAGE,,} # Convert my username to lowercase
          TAG=sha-${{ github.sha }}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to GitHub Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Create realse-manifest.json
        run: |
          cat <<EOF > release-manifest.json
          {
            "commit": "${{ github.sha }}",
            "services": {
              "api": {
                "image": "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}",
                "digest": "${{ steps.build-and-push.outputs.digest }}"
              }
            }
          }
          EOF

      - name: Save artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: release-manifest.json

  deploy:
    name: Deploy to Stage Env
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - run: echo "Deploying..."
