name: Deploy to production env
on:
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: [self-hosted, production]
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download release-manifest.json
        uses: actions/download-artifact@v8
        with:
          name: release-manifest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set metadata
        id: meta
        run: |
          echo "Downloaded artifact:"
          cat release-manifest.json
          echo "image=$(jq .services.api.image release-manifest.json)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from the registry
        run: docker pull ${{ steps.meta.outputs.image }}

      - name: Deploy
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_PORT: ${{ vars.API_PORT }}
        run: |
          cp .env.example .env
          echo "DB_PASSWORD=$DB_PASSWORD" >> .env
          echo "API_PORT=$API_PORT" >> .env
          docker compose -f compose.prod.yml -p prod up -d

      - name: Post-deploy test
        run: |
          curl -f http://localhost:${{ vars.API_PORT }}/health || exit 1

