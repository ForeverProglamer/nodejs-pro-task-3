name: PR Checks
on:
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.13.0'

      - name: Install deps
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Quality Gate - Docker build validation
        run: docker build --check .

      - name: Run E2E tests
        run: npm run test:e2e
