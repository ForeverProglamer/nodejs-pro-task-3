services:
  api:
    profiles: [all, infra]
    build:
      context: .
      target: prod
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      rabbitmq:
        condition: service_started
      migrate:
        condition: service_started

  postgres:
    profiles: [all, infra]
    image: postgres:17.4-alpine3.21
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nest_task3_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - db_data:/var/lib/postgresql/data

  rabbitmq:
    profiles: [all, infra]
    image: rabbitmq:4.2.4-management-alpine
    restart: unless-stopped
    hostname: message-broker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  migrate:
    profiles: [all, job, migrate]
    build:
      context: .
      target: build
    command: npm run db:migrate
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    profiles: [all, job, seed]
    build:
      context: .
      target: build
    command: npm run seed
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
  rabbitmq_data:
